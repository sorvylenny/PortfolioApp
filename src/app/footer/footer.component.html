<footer class="site-footer">
  <div class="footer-inner">
    <div>
      <span class="footer-kicker">Trabajemos juntos</span>
      <h2>Katherine Flores Marin</h2>
      <p>Desarrollo web, aplicaciones móviles y soluciones digitales con foco en producto.</p>
    </div>

    <div class="footer-actions">
      <a *ngFor="let item of list_Icon" [href]="item.links" target="_blank" rel="noopener noreferrer"
        class="footer-link" [attr.aria-label]="item.links">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
          [class]="item.description" viewBox="0 0 16 16" aria-hidden="true">
          <path [attr.d]="item.description2"></path>
          <path [attr.d]="item.description3"></path>
        </svg>
      </a>
    </div>
  </div>

  <div class="footer-bottom">
    <span>© {{currentYear}} Realizado por Katherine Flores</span>
  </div>
</footer>
